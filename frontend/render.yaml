{
  "version": "1",
  "buildCommand": "npm ci && npm run build",
  "startCommand": "npm start",
  "outputDirectory": "dist",
  "installCommand": "npm ci",
  "nodeVersion": "18",
  "framework": "vite",
  "env": {
    "NODE_ENV": "production",
    "SERVICE_MODE": "production"
  },
  "routes": [
    {
      "src": "/api",
      "dest": "https://votre-backend-url.com/api"
    },
    {
      "src": "/(.*)",
      "dest": "/index.html"
    }
  ],
  "headers": [
    {
      "source": "/static/(.*)",
      "headers": [
        {
          "key": "Cache-Control",
          "value": "public, max-age=31536000, immutable"
        }
      ]
    }
  ]
}
