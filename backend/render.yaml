services:
  - type: web
    name: xpert-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: npm start
    healthCheckPath: /api/health
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BADGE_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://registre-employe.netlify.app
      - key: FRONTEND_URL
        value: https://registre-employe.netlify.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://registre-employe.netlify.app
