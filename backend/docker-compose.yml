version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: xpert_postgres
    environment:
      POSTGRES_DB: pointage_production
      POSTGRES_USER: xpert_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - xpert_network
    restart: unless-stopped

  # Backend Xpert Pro
  backend:
    build: .
    container_name: xpert_backend
    environment:
      DATABASE_URL: postgresql://xpert_user:${POSTGRES_PASSWORD}@postgres:5432/pointage_production
      JWT_SECRET: ${JWT_SECRET}
      BADGE_SECRET: ${BADGE_SECRET}
      NODE_ENV: production
      SERVICE_MODE: production
      PORT: 3003
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "3003:3003"
    depends_on:
      - postgres
    networks:
      - xpert_network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # Nginx pour le reverse proxy
  nginx:
    image: nginx:alpine
    container_name: xpert_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - xpert_network
    restart: unless-stopped

volumes:
  postgres_data:
  logs:

networks:
  xpert_network:
    driver: bridge
